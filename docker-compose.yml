services:
  mysql8_new:
    image: mysql:8.0
    container_name: mysql8_new
    restart: always
    environment:
      MYSQL_DATABASE: mubs_super_admin
      MYSQL_ROOT_PASSWORD: RaccoonS!lly4709
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mubs-network

  phpmyadmin_8:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_8
    restart: always
    ports:
      - "8085:80"
    environment:
      PMA_HOST: mysql8_new
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: RaccoonS!lly4709
    depends_on:
      - mysql8_new
    networks:
      - mubs-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mubs-me-app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DB_HOST: mysql8_new
      DB_USER: root
      DB_PASSWORD: RaccoonS!lly4709
      DB_NAME: mubs_super_admin
    depends_on:
      - mysql8_new
    networks:
      - mubs-network

volumes:
  mysql_data:

networks:
  mubs-network:
    driver: bridge
